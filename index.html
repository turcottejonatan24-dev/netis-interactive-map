<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Netis Interactive Map</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; overflow: hidden; font-family: monospace; }

    @keyframes pulse {
      0% { transform: translate(-50%,-50%) scale(1); opacity: 0.8; }
      100% { transform: translate(-50%,-50%) scale(2.5); opacity: 0; }
    }
    @keyframes pulseStrong {
      0% { transform: translate(-50%,-50%) scale(1); opacity: 1; }
      100% { transform: translate(-50%,-50%) scale(3); opacity: 0; }
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .bubble {
      position: fixed;
      width: 32px; height: 32px;
      border-radius: 50%;
      transform: translate(-50%, -50%);
      cursor: pointer;
      pointer-events: auto;
      z-index: 40;
      transition: width 0.2s, height 0.2s;
    }
    .bubble-dot {
      position: absolute;
      width: 10px; height: 10px;
      border-radius: 50%;
      top: 50%; left: 50%;
      transform: translate(-50%,-50%);
    }
    .bubble-ring {
      position: absolute;
      width: 32px; height: 32px;
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.5);
      top: 50%; left: 50%;
      animation: pulse 2s ease-out infinite;
    }
    .bubble:hover .bubble-ring {
      animation: pulseStrong 1s ease-out infinite;
    }
    .bubble-label {
      position: absolute;
      top: -28px; left: 50%;
      transform: translateX(-50%);
      white-space: nowrap;
      font-size: 9px;
      letter-spacing: 2px;
      color: white;
      opacity: 0;
      transition: opacity 0.2s;
      background: rgba(0,0,0,0.6);
      padding: 3px 8px;
      border-radius: 10px;
    }
    .bubble:hover .bubble-label { opacity: 1; }

    .hotspot {
      position: fixed;
      transform: translate(-50%,-50%);
      cursor: pointer;
      pointer-events: auto;
      z-index: 45;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .hotspot-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: white;
      flex-shrink: 0;
    }
    .hotspot-ring {
      position: absolute;
      width: 18px; height: 18px;
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.6);
      top: 50%; left: 4px;
      transform: translate(-50%,-50%);
      animation: pulse 1.5s ease-out infinite;
    }
    .hotspot-label {
      font-size: 9px;
      letter-spacing: 2px;
      color: white;
      background: rgba(5,10,24,0.85);
      padding: 3px 8px;
      border-radius: 8px;
      white-space: nowrap;
    }

    button { transition: background 0.2s; }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>

  <!-- UI top left -->
  <div style="position:fixed;top:32px;left:32px;color:white;z-index:100;pointer-events:none;">
    <div style="font-size:9px;letter-spacing:4px;opacity:0.4;margin-bottom:6px;">NETIS INTERACTIVE MAP</div>
    <div style="font-size:24px;font-weight:300;letter-spacing:2px;">NETIS</div>
  </div>

  <!-- Back button -->
  <button id="back-btn" onclick="window.goBack()" style="
    display:none;
    position:fixed;top:32px;right:32px;
    background:rgba(5,10,24,0.9);
    border:0.5px solid rgba(255,255,255,0.2);
    border-radius:8px;padding:10px 20px;
    color:white;font-family:monospace;
    font-size:10px;letter-spacing:2px;cursor:pointer;z-index:200;
  ">← RETOUR</button>

  <!-- Commercial panel -->
  <div id="panel" style="
    display:none;
    position:fixed;top:50%;right:32px;
    transform:translateY(-50%);
    width:300px;
    background:rgba(5,10,24,0.95);
    border:0.5px solid rgba(255,255,255,0.1);
    border-radius:16px;overflow:hidden;
    color:white;z-index:150;
    backdrop-filter:blur(20px);
    animation: fadeIn 0.3s ease;
  ">
    <div id="panel-header" style="padding:20px 20px 16px;border-bottom:0.5px solid rgba(255,255,255,0.08);position:relative;">
      <div id="panel-close" style="position:absolute;top:14px;right:16px;cursor:pointer;opacity:0.4;font-size:14px;z-index:10;" onclick="document.getElementById('panel').style.display='none'">✕</div>
      <div id="panel-category" style="font-size:8px;letter-spacing:3px;opacity:0.5;margin-bottom:8px;"></div>
      <div id="panel-name" style="font-size:20px;font-weight:300;letter-spacing:1px;margin-bottom:6px;"></div>
      <div id="panel-tagline" style="font-size:11px;opacity:0.55;line-height:1.6;font-family:sans-serif;"></div>
    </div>
    <div style="padding:16px 20px;border-bottom:0.5px solid rgba(255,255,255,0.08);">
      <div style="font-size:8px;letter-spacing:3px;opacity:0.4;margin-bottom:12px;">BÉNÉFICES</div>
      <div id="panel-benefits"></div>
    </div>
    <div style="padding:16px 20px;display:flex;flex-direction:column;gap:8px;">
      <button id="btn-video" style="display:flex;align-items:center;gap:10px;background:rgba(255,255,255,0.05);border:0.5px solid rgba(255,255,255,0.12);border-radius:8px;padding:10px 14px;color:white;font-family:monospace;font-size:10px;letter-spacing:1px;cursor:pointer;">
        <span>▶</span>
        <div style="text-align:left;"><div>VOIR LA VIDÉO</div><div style="opacity:0.4;font-size:9px;margin-top:1px;">Présentation solution</div></div>
      </button>
      <button id="btn-brochure" style="display:flex;align-items:center;gap:10px;background:rgba(255,255,255,0.05);border:0.5px solid rgba(255,255,255,0.12);border-radius:8px;padding:10px 14px;color:white;font-family:monospace;font-size:10px;letter-spacing:1px;cursor:pointer;">
        <span>↓</span>
        <div style="text-align:left;"><div>TÉLÉCHARGER PDF</div><div style="opacity:0.4;font-size:9px;margin-top:1px;">Fiche technique</div></div>
      </button>
      <button id="btn-contact" style="display:flex;align-items:center;gap:10px;background:rgba(68,102,255,0.15);border:0.5px solid rgba(68,102,255,0.4);border-radius:8px;padding:10px 14px;color:white;font-family:monospace;font-size:10px;letter-spacing:1px;cursor:pointer;">
        <span>→</span>
        <div style="text-align:left;"><div>NOUS CONTACTER</div><div style="opacity:0.5;font-size:9px;margin-top:1px;">Réponse sous 24h</div></div>
      </button>
    </div>
  </div>

  <!-- Detail panel for hotspot -->
  <div id="detail-panel" style="
    display:none;
    position:fixed;bottom:32px;left:50%;
    transform:translateX(-50%);
    background:rgba(5,10,24,0.95);
    border:0.5px solid rgba(255,255,255,0.1);
    border-radius:12px;padding:20px 28px;
    color:white;z-index:200;
    backdrop-filter:blur(20px);
    min-width:380px;
    animation: fadeIn 0.3s ease;
  ">
    <div id="detail-close" onclick="document.getElementById('detail-panel').style.display='none'"
      style="position:absolute;top:12px;right:14px;cursor:pointer;opacity:0.4;font-size:13px;">✕</div>
    <div id="detail-tag" style="font-size:8px;letter-spacing:3px;opacity:0.4;margin-bottom:12px;"></div>
    <div id="detail-grid" style="display:grid;grid-template-columns:1fr 1fr;gap:14px;"></div>
  </div>

  <!-- Bubbles container -->
  <div id="bubbles-container" style="position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:40;"></div>

  <!-- Hotspots container -->
  <div id="hotspots-container" style="position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:45;"></div>

  <!-- Bottom hints -->
  <div style="position:fixed;bottom:32px;left:32px;color:white;opacity:0.3;font-size:9px;letter-spacing:2px;pointer-events:none;z-index:100;">
    DRAG TO EXPLORE — SCROLL TO ZOOM
  </div>
  <div style="position:fixed;bottom:32px;right:32px;color:white;opacity:0.3;font-size:9px;letter-spacing:2px;pointer-events:none;z-index:100;">
    26.04.2026
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
